name: Release

# Publishes the assembled sparkmobility fat JAR as a GitHub Release asset
# on tag push. This replaces the manual pushToGCS.py flow and removes the
# service-account-key dependency on contributors.
#
# Python's sparkmobility.ensure_jar() should be pointed at
#   https://github.com/humnetlab/sparkmobility-scala/releases/download/v{version}/sparkmobility-{version}.jar
# once the first release has been cut here.
#
# Tag format: v<version> matching build.sbt's ThisBuild / version.
# Example:    git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'adopt'

      - name: Setup sbt launcher
        uses: sbt/setup-sbt@v1

      - name: Coursier cache
        uses: coursier/cache-action@v6

      - name: Verify tag matches build.sbt version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          SBT_VERSION=$(grep -oP '(?<=ThisBuild / version := ")[^"]+' build.sbt)
          if [ "$TAG_VERSION" != "$SBT_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match build.sbt version $SBT_VERSION" >&2
            exit 1
          fi

      - name: Assemble JAR
        run: sbt assembly

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: target/scala-2.13/sparkmobility-*.jar
          fail_on_unmatched_files: true
          generate_release_notes: true
